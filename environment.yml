name: radar
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.13
  - pip

  # Scientific stack
  - numpy
  - scipy
  - scikit-learn
  - matplotlib
  - pillow

  # Project/runtime packages
  - pyserial
  - loguru
  - pyyaml

  # GUI; conda version is usually safer than pip PyQt on Linux
  - pyqt=5
  - imageio-ffmpeg

  - pip:
      - future==1.0.0
      - iso8601==2.1.0
      - panda3d==1.10.15